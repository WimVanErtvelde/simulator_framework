aircraft:
  id: c172
  type: fixed_wing
  name: Cessna 172 Skyhawk
  required_nodes:
    - flight_model_adapter
    - atmosphere_node
    - input_arbitrator
    - sim_fuel
    - sim_electrical
    - sim_engine_systems
    - sim_gear
    - sim_air_data
    - sim_navigation

initial_conditions:
  latitude_rad: 0.8886045    # 50.9014 deg N (EBBR)
  longitude_rad: 0.0782834   # 4.4844 deg E
  altitude_msl_m: 100.0    # approximate — on-ground overrides to terrain
  heading_rad: 0.6981        # 040 deg
  bank_rad: 0.0
  pitch_rad: 0.0
  airspeed_ms: 0.0          # 90 kt
  oat_deviation_k: 0.0
  qnh_pa: 101325.0
  fuel_total_pct: 0.75
  configuration: ready_for_takeoff

gear_ground_height_m: 1.48      # CG height above ground when static on gear (for IC placement only)

gear_points:
  - name: nose
    x_m: 1.85
    y_m: 0.0
    z_m: -0.50
  - name: left_main
    x_m: -0.12
    y_m: -1.47
    z_m: -0.50
  - name: right_main
    x_m: -0.12
    y_m: 1.47
    z_m: -0.50
