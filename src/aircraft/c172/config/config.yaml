aircraft:
  id: c172
  type: fixed_wing
  name: Cessna 172 Skyhawk
  required_nodes:
    - flight_model_adapter
    - weather_solver
    - input_arbitrator
    - sim_fuel
    - sim_electrical
    - sim_engine_systems
    - sim_gear
    - sim_air_data
    - sim_navigation

jsbsim_model_name: "c172p"

initial_conditions:
  latitude_deg: 50.9014       # EBBR
  longitude_deg: 4.4844
  altitude_msl_m: 100.0    # approximate — on-ground overrides to terrain
  heading_rad: 0.6981        # 040 deg
  bank_rad: 0.0
  pitch_rad: 0.0
  airspeed_ms: 0.0          # 90 kt
  oat_deviation_k: 0.0
  qnh_pa: 101325.0
  fuel_total_norm: 0.75
  configuration: cold_and_dark

gear_ground_height_m: 1.48      # CG height above ground when static on gear (for IC placement only)

gear_points:
  - name: nose
    x_m: 1.85
    y_m: 0.0
    z_m: -0.50
  - name: left_main
    x_m: -0.12
    y_m: -1.47
    z_m: -0.50
  - name: right_main
    x_m: -0.12
    y_m: 1.47
    z_m: -0.50
