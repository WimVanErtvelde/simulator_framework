failures:
  - id: ata24_alternator_failure
    ata: 24
    display_name: "Alternator Failure"
    category: electrical
    injection:
      handler: electrical
      method: set_electrical_component_failed
      params: {component_id: ALT1}

  - id: ata24_battery_failure
    ata: 24
    display_name: "Battery Failure"
    category: electrical
    injection:
      handler: electrical
      method: set_electrical_component_failed
      params: {component_id: BAT1}

  - id: ata24_cb_fuel_pump
    ata: 24
    display_name: "CB - Fuel Pump"
    category: circuit_breaker
    injection:
      handler: electrical
      method: set_circuit_breaker_state
      params: {component_id: CB_FUEL_PUMP, state: popped}

  - id: ata26_engine_fire
    ata: 26
    display_name: "Engine Fire"
    category: engine
    injection:
      handler: flight_model
      method: set_engine_fire
      params: {engine_index: 0, value: true}

  - id: ata28_fuel_leak_left
    ata: 28
    display_name: "Fuel Leak - Left Tank"
    category: fuel
    injection:
      handler: flight_model
      method: set_fuel_tank_drain
      params: {tank_index: 0, rate_lph: 20.0}

  - id: ata28_fuel_leak_right
    ata: 28
    display_name: "Fuel Leak - Right Tank"
    category: fuel
    injection:
      handler: flight_model
      method: set_fuel_tank_drain
      params: {tank_index: 1, rate_lph: 20.0}

  - id: ata32_gear_unsafe_indication
    ata: 32
    display_name: "Gear Unsafe Indication"
    category: gear
    injection:
      handler: flight_model
      method: set_gear_unsafe_indication
      params: {gear_index: 0}

  - id: ata34_nav1_receiver_failed
    ata: 34
    display_name: "NAV1 Receiver Failure"
    category: navigation
    injection:
      handler: sim_failures
      method: set_nav_receiver_failed
      params: {receiver_id: NAV1}

  - id: ata34_nav2_receiver_failed
    ata: 34
    display_name: "NAV2 Receiver Failure"
    category: navigation
    injection:
      handler: sim_failures
      method: set_nav_receiver_failed
      params: {receiver_id: NAV2}

  - id: ata34_adf_receiver_failed
    ata: 34
    display_name: "ADF Receiver Failure"
    category: navigation
    injection:
      handler: sim_failures
      method: set_nav_receiver_failed
      params: {receiver_id: ADF}

  - id: ata34_attitude_indicator_failed
    ata: 34
    display_name: "Attitude Indicator Failure"
    category: instruments
    injection:
      handler: sim_failures
      method: set_instrument_failed
      params: {instrument_id: ATT}

  - id: ata34_altimeter_failed
    ata: 34
    display_name: "Altimeter Failure"
    category: instruments
    injection:
      handler: sim_failures
      method: set_instrument_failed
      params: {instrument_id: ALT1}

  - id: ata34_pitot_failed
    ata: 34
    display_name: "Pitot Tube Failure"
    category: instruments
    injection:
      handler: flight_model
      method: set_pitot_failed
      params: {index: 0}

  - id: ata71_engine_failure
    ata: 71
    display_name: "Engine Failure"
    category: engine
    injection:
      handler: flight_model
      method: set_engine_running
      params: {engine_index: 0, value: false}

  - id: ata71_partial_power_60pct
    ata: 71
    display_name: "Partial Power (60%)"
    category: engine
    injection:
      handler: flight_model
      method: set_engine_thrust_scalar
      params: {engine_index: 0, value: 0.6}

  - id: ata71_partial_power_80pct
    ata: 71
    display_name: "Partial Power (80%)"
    category: engine
    injection:
      handler: flight_model
      method: set_engine_thrust_scalar
      params: {engine_index: 0, value: 0.8}

  - id: ata71_low_oil_pressure
    ata: 71
    display_name: "Low Oil Pressure"
    category: engine
    injection:
      handler: flight_model
      method: set_engine_oil_pressure
      params: {engine_index: 0, value_psi: 15.0}

  - id: world_navaid_station_failed
    ata: ~
    display_name: "Navaid Station Failure"
    category: world_navaid
    injection:
      handler: navaid_sim
      method: set_navaid_station_failed
      params: {station_id: ""}
