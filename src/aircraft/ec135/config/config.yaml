aircraft:
  id: ec135
  type: helicopter
  name: Eurocopter EC135
  required_nodes:
    - flight_model_adapter
    - atmosphere_node
    - input_arbitrator
    - sim_fuel
    - sim_electrical
    - sim_engine_systems
    - sim_gear
    - sim_navigation

initial_conditions:
  latitude_rad: 0.9145218    # ~52.3 deg N (EHAM)
  longitude_rad: 0.0777841   # ~4.46 deg E
  altitude_msl_m: -3.35      # on ground at Schiphol (-11 ft)
  heading_rad: 0.6109        # ~35 deg
  airspeed_ms: 0.0
  oat_deviation_k: 0.0
  qnh_pa: 101325.0
  fuel_total_pct: 0.80
  configuration: cold_and_dark
